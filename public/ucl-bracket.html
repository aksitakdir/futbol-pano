<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oyna & Paylaş</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #06101f;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 16px;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    }

    #app {
      background: #0a1628;
      width: 100%;
      max-width: 960px;
      padding: 20px 16px 16px;
      border-radius: 14px;
      color: #fff;
      border: 1px solid #1a3050;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #00d4aa;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .subtitle {
      text-align: center;
      font-size: 11px;
      color: #7090b0;
      margin-bottom: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bracket-container {
      display: grid;
      grid-template-columns:
        minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr)
        88px
        minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      align-items: stretch;
      min-height: 530px;
    }

    .round-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: stretch;
      min-width: 0;
      width: 100%;
      padding: 4px 3px;
    }

    /* Sağ yarı: başlıklar sağa hizalı; kutular yine tam sütun genişliğinde */
    .round-col--right .round-label {
      text-align: right;
    }

    .match-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin: 6px 0;
      width: 100%;
      min-width: 0;
    }

    .team-slot {
      box-sizing: border-box;
      width: 100%;
      max-width: 100%;
      background: #1a2f50;
      border: 1px solid #2a4a7a;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.22s, border-color 0.22s, color 0.22s, opacity 0.3s, box-shadow 0.22s;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 34px;
      color: #cce0ff;
      letter-spacing: 0.5px;
      overflow: hidden;
      user-select: none;
    }

    .team-slot .player-name {
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-slot .player-club {
      font-size: 9px;
      font-weight: 400;
      opacity: 0.6;
      margin-top: 1px;
    }

    .team-slot.team-only .player-club { display: none; }
    /* Sol/sağ Son 16 aynı kutu yüksekliği (team-only dahil) */
    .team-slot.team-only { min-height: 34px; justify-content: center; }

    .team-slot:hover {
      background: #243d66;
      border-color: #00d4aa;
      color: #fff;
    }

    .team-slot.winner {
      background: #0d3028;
      border-color: #00d4aa;
      color: #00d4aa;
    }

    .team-slot.loser {
      background: #1a1a2a;
      border-color: #2a2a3a;
      color: #405060;
      text-decoration: line-through;
    }

    .team-slot.empty {
      background: #0f1e35;
      border: 1px dashed #2a3a50;
      color: #304050;
      cursor: default;
      font-style: italic;
    }

    .team-slot.champion {
      background: #003d30;
      border-color: #00d4aa;
      color: #00d4aa;
      animation: champGlow 1.5s ease-in-out infinite alternate;
    }

    @keyframes champGlow {
      from { box-shadow: 0 0 4px #00d4aa44; }
      to   { box-shadow: 0 0 18px #00d4aa99; }
    }

    .round-label {
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #4a7ab8;
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #1a3050;
    }

    .center-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }

    .center-col .match-group {
      align-self: stretch;
      width: 100%;
      min-width: 0;
    }

    .trophy { font-size: 34px; text-align: center; }

    .final-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #00d4aa;
      text-transform: uppercase;
      text-align: center;
    }

    #championDisplay {
      display: none;
      text-align: center;
      margin-top: 12px;
      padding: 10px;
      background: #003d30;
      border: 1px solid #00d4aa;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #00d4aa;
      letter-spacing: 1px;
    }

    #shareBtn {
      display: none;
      margin: 8px auto 0;
      background: #1da1f2;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 16px;
      cursor: pointer;
      text-transform: uppercase;
    }

    #shareBtn:hover { background: #0d8fd8; }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      font-family: inherit;
      font-size: 11px;
      padding: 7px 18px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-reset {
      background: #1a2f50;
      border: 1px solid #2a4a7a;
      color: #7090c0;
    }

    .btn-reset:hover {
      background: #243d66;
      color: #aac0e0;
    }

    @media (max-width: 600px) {
      .team-slot {
        font-size: 9px;
        padding: 4px 5px;
        min-height: 28px;
      }
      .team-slot.team-only { min-height: 28px; }
      .bracket-container {
        grid-template-columns:
          minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr)
          60px
          minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      }
      .trophy { font-size: 22px; }
    }
  </style>
</head>
<body>

<div id="app">
  <h1 id="pageTitle">Oyna & Paylaş</h1>
  <div class="subtitle" id="pageSubtitle"></div>

  <div class="bracket-container" id="bracket"></div>

  <div id="championDisplay"></div>
  <button type="button" id="shareBtn">Twitter'da Paylaş</button>

  <div class="btn-row">
    <button type="button" class="btn btn-reset" onclick="resetBracket()">Sıfırla</button>
  </div>
</div>

<script>
(function () {
  const PARAM = new URLSearchParams(location.search).get('t') || 'stars';
  const VALID_MODES = ['stars', 'ucl', 'managers', 'legends', 'foreigners'];
  const MODE = VALID_MODES.includes(PARAM) ? PARAM : 'stars';

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function pairsFromNames(names) {
    var s = shuffle(names.slice());
    var out = [];
    for (var i = 0; i < 8; i++) {
      out.push({ t1: s[i * 2], c1: '', t2: s[i * 2 + 1], c2: '' });
    }
    return out;
  }

  function pairsFromPlayers(players) {
    var s = shuffle(players.slice());
    var out = [];
    for (var i = 0; i < 8; i++) {
      var a = s[i * 2], b = s[i * 2 + 1];
      out.push({ t1: a.name, c1: a.club, t2: b.name, c2: b.club });
    }
    return out;
  }

  /* 16 genç oyuncu — her yüklemede rastgele 8 eşleşme */
  var STARS_POOL = [
    { name: 'L. Yamal', club: 'Barcelona' },
    { name: 'Arda Güler', club: 'R. Madrid' },
    { name: 'Pau Cubarsí', club: 'Barcelona' },
    { name: 'Leny Yoro', club: 'Man United' },
    { name: 'K. Mainoo', club: 'Man United' },
    { name: 'Zaïre-Emery', club: 'PSG' },
    { name: 'Endrick', club: 'R. Madrid' },
    { name: 'K. Yıldız', club: 'Juventus' },
    { name: 'Garnacho', club: 'Man United' },
    { name: 'R. Cherki', club: 'Dortmund' },
    { name: 'D. Huijsen', club: 'Bournemouth' },
    { name: 'Mathys Tel', club: 'Bayern' },
    { name: 'E. Anderson', club: "Nott'm F." },
    { name: 'G. Scalvini', club: 'Atalanta' },
    { name: 'C. Lukeba', club: 'Leipzig' },
    { name: 'Zabarnyi', club: 'Bournemouth' },
  ];

  /* UEFA ŞL 2024-25 son 16 — resmi kura (şubat 2025), sabit */
  var UCL_FIXED = [
    { t1: 'Paris Saint-Germain', c1: '', t2: 'Liverpool', c2: '' },
    { t1: 'Club Brugge', c1: '', t2: 'Aston Villa', c2: '' },
    { t1: 'Real Madrid', c1: '', t2: 'Atlético Madrid', c2: '' },
    { t1: 'PSV', c1: '', t2: 'Arsenal', c2: '' },
    { t1: 'Feyenoord', c1: '', t2: 'Inter', c2: '' },
    { t1: 'Bayern München', c1: '', t2: 'Bayer Leverkusen', c2: '' },
    { t1: 'Borussia Dortmund', c1: '', t2: 'Lille', c2: '' },
    { t1: 'Benfica', c1: '', t2: 'Barcelona', c2: '' },
  ];

  var MANAGERS_POOL = [
    'Pep Guardiola', 'Jose Mourinho', 'Carlo Ancelotti', 'Jurgen Klopp',
    'Zinedine Zidane', 'Diego Simeone', 'Erik ten Hag', 'Xavi',
    'Mikel Arteta', 'Roberto De Zerbi', 'Ruben Amorim', 'Thomas Tuchel',
    'Antonio Conte', 'Mauricio Pochettino', 'Ange Postecoglou', 'Graham Potter',
  ];

  var LEGENDS_POOL = [
    'Emre Belözoğlu', 'Tuncay Şanlı', 'Nihat Kahveci', 'İlhan Mansız',
    'Bülent Korkmaz', 'Okan Buruk', 'Sergen Yalçın', 'Oktay Derelioğlu',
    'Tugay Kerimoglu', 'Rüştü Reçber', 'Şenol Güneş', 'Ali Güneş',
    'Hamza Hamzaoğlu', 'Tamer Tuna', 'Fatih Terim', 'Mustafa Denizli',
  ];

  var FOREIGNERS_POOL = [
    'Didier Drogba', 'Nicolas Anelka', 'Radamel Falcao', 'Wesley Sneijder',
    'Dirk Kuyt', 'Emmanuel Eboue', 'Lorik Cana', 'Milan Baros',
    'Cisse', 'Shabani Nonda', 'Rigobert Song', 'Didier Zokora',
    'Mamadou Niang', 'Youri Djorkaeff', 'Umit Davala', 'Hasan Şaş',
  ];

  var TOURNAMENTS = {
    stars: {
      h1: 'Gelecek Yıldızlar',
      subtitle: 'Her açılışta rastgele eşleşmeler — sen kimin şampiyon olacağını seç',
      teamOnly: false,
      buildMatches: function () { return pairsFromPlayers(STARS_POOL); },
    },
    ucl: {
      h1: 'Şampiyonlar Ligi 2024-25',
      subtitle: 'Resmi son 16 kura eşleşmeleri (2024-25 sezonu)',
      teamOnly: true,
      buildMatches: function () { return UCL_FIXED.slice(); },
    },
    managers: {
      h1: 'Teknik Direktör Arenası',
      subtitle: 'Her açılışta rastgele eşleşmeler — hangi hoca kupayı kaldırır?',
      teamOnly: true,
      buildMatches: function () { return pairsFromNames(MANAGERS_POOL); },
    },
    legends: {
      h1: 'Süper Lig Efsaneleri',
      subtitle: 'Her açılışta rastgele eşleşmeler — efsanelerden tek şampiyon',
      teamOnly: true,
      buildMatches: function () { return pairsFromNames(LEGENDS_POOL); },
    },
    foreigners: {
      h1: "Türkiye'de Oynamış En İyi Yabancılar",
      subtitle: 'Her açılışta rastgele eşleşmeler — unutulmaz yabancılardan birini taçlandır',
      teamOnly: true,
      buildMatches: function () { return pairsFromNames(FOREIGNERS_POOL); },
    },
  };

  var cfg = TOURNAMENTS[MODE];
  var MATCHES_R16 = cfg.buildMatches();
  var teamOnly = cfg.teamOnly;

  document.getElementById('pageTitle').textContent = cfg.h1;
  document.getElementById('pageSubtitle').textContent = cfg.subtitle;
  document.title = cfg.h1 + ' | Oyna & Paylaş';

  let state = {
    r16: Array(8).fill(null),
    qf: Array(4).fill(null),
    sf: Array(2).fill(null),
    champion: null,
  };

  function getQFM() {
    return [0, 1, 2, 3].map(i => ({
      t1: state.r16[i * 2] || null,
      t2: state.r16[i * 2 + 1] || null,
    }));
  }

  function getSFM() {
    return [0, 1].map(i => ({
      t1: state.qf[i * 2] || null,
      t2: state.qf[i * 2 + 1] || null,
    }));
  }

  function getFM() {
    return { t1: state.sf[0] || null, t2: state.sf[1] || null };
  }

  function getClub(name) {
    for (const m of MATCHES_R16) {
      if (m.t1 === name) return m.c1;
      if (m.t2 === name) return m.c2;
    }
    return '';
  }

  function escAttr(s) {
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  function selectWinner(round, idx, team) {
    if (!team) return;

    if (round === 'r16') {
      state.r16[idx] = team;
      state.qf[Math.floor(idx / 2)] = null;
      state.sf[Math.floor(idx / 4)] = null;
      state.champion = null;
    } else if (round === 'qf') {
      state.qf[idx] = team;
      state.sf[Math.floor(idx / 2)] = null;
      state.champion = null;
    } else if (round === 'sf') {
      state.sf[idx] = team;
      state.champion = null;
    } else if (round === 'final') {
      state.champion = team;
    }

    render();
    checkComplete();
  }

  function championShareLabel() {
    if (!state.champion) return '';
    if (teamOnly) return state.champion;
    const c = getClub(state.champion);
    return c ? state.champion + ' (' + c + ')' : state.champion;
  }

  function checkComplete() {
    const ok = !!state.champion;
    const cd = document.getElementById('championDisplay');
    const sb = document.getElementById('shareBtn');

    cd.style.display = ok ? 'block' : 'none';
    sb.style.display = ok ? 'block' : 'none';

    if (ok) {
      const label = championShareLabel();
      cd.innerHTML = teamOnly
        ? '🏆 Şampiyon: <span style="color:#fff">' + label + '</span>'
        : '⭐ Şampiyonun: <span style="color:#fff">' + label + '</span>';
    }
  }

  function shareFavorite() {
    const who = championShareLabel();
    const text =
      'Scout Intelligence Oyna & Paylaş’ta benim şampiyonum: ' + who +
      '! Sen kimi seçerdin? 🏆 futbol-pano.vercel.app/arena #ScoutIntelligence';
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
  }

  document.getElementById('shareBtn').addEventListener('click', shareFavorite);

  function resetBracket() {
    state = {
      r16: Array(8).fill(null),
      qf: Array(4).fill(null),
      sf: Array(2).fill(null),
      champion: null,
    };
    render();
    checkComplete();
  }

  function slot(team, win, lose, oc, extraCls) {
    let c = 'team-slot' + ((!team) ? ' empty' : win ? ' winner' : lose ? ' loser' : '');
    if (teamOnly && team) c += ' team-only';
    if (extraCls) c += ' ' + extraCls;
    const club = team && !teamOnly ? getClub(team) : '';
    const inner = team
      ? '<div class="player-name">' + team + '</div><div class="player-club">' + club + '</div>'
      : '?';
    return '<div class="' + c + '" onclick="' + (oc || '') + '">' + inner + '</div>';
  }

  function r16g(i) {
    const m = MATCHES_R16[i];
    const w = state.r16[i];
    const e1 = escAttr(m.t1);
    const e2 = escAttr(m.t2);
    return '<div class="match-group" data-g="r16-' + i + '">'
      + slot(m.t1, w === m.t1, w && w !== m.t1, "selectWinner('r16'," + i + ",'" + e1 + "')")
      + slot(m.t2, w === m.t2, w && w !== m.t2, "selectWinner('r16'," + i + ",'" + e2 + "')")
      + '</div>';
  }

  function qfg(i) {
    const qf = getQFM();
    const m = qf[i];
    const w = state.qf[i];
    if (!m.t1 && !m.t2) {
      return '<div class="match-group" data-g="qf-' + i + '">'
        + slot(null, false, false, '') + slot(null, false, false, '') + '</div>';
    }
    const o1 = m.t1 ? "selectWinner('qf'," + i + ",'" + escAttr(m.t1) + "')" : '';
    const o2 = m.t2 ? "selectWinner('qf'," + i + ",'" + escAttr(m.t2) + "')" : '';
    return '<div class="match-group" data-g="qf-' + i + '">'
      + slot(m.t1, w === m.t1, w && w !== m.t1, o1)
      + slot(m.t2, w === m.t2, w && w !== m.t2, o2)
      + '</div>';
  }

  function sfg(i) {
    const sf = getSFM();
    const m = sf[i];
    const w = state.sf[i];
    if (!m.t1 && !m.t2) {
      return '<div class="match-group" data-g="sf-' + i + '">'
        + slot(null, false, false, '') + slot(null, false, false, '') + '</div>';
    }
    const o1 = m.t1 ? "selectWinner('sf'," + i + ",'" + escAttr(m.t1) + "')" : '';
    const o2 = m.t2 ? "selectWinner('sf'," + i + ",'" + escAttr(m.t2) + "')" : '';
    return '<div class="match-group" data-g="sf-' + i + '">'
      + slot(m.t1, w === m.t1, w && w !== m.t1, o1)
      + slot(m.t2, w === m.t2, w && w !== m.t2, o2)
      + '</div>';
  }

  function fg() {
    const fm = getFM();
    const ch = state.champion;

    const s1 = fm.t1
      ? '<div class="team-slot' + (teamOnly ? ' team-only' : '') + (ch === fm.t1 ? ' champion' : '') + '" onclick="selectWinner(\'final\',-1,\'' + escAttr(fm.t1) + '\')">'
        + '<div class="player-name">' + fm.t1 + '</div>' + (teamOnly ? '' : '<div class="player-club">' + getClub(fm.t1) + '</div>') + '</div>'
      : '<div class="team-slot empty">?</div>';

    const s2 = fm.t2
      ? '<div class="team-slot' + (teamOnly ? ' team-only' : '') + (ch === fm.t2 ? ' champion' : '') + '" onclick="selectWinner(\'final\',-1,\'' + escAttr(fm.t2) + '\')">'
        + '<div class="player-name">' + fm.t2 + '</div>' + (teamOnly ? '' : '<div class="player-club">' + getClub(fm.t2) + '</div>') + '</div>'
      : '<div class="team-slot empty">?</div>';

    return '<div class="match-group" data-g="final">' + s1 + s2 + '</div>';
  }

  function render() {
    document.getElementById('bracket').innerHTML =
      '<div class="round-col">'
        + '<div class="round-label">Son 16</div>'
        + [0, 1, 2, 3].map(r16g).join('')
      + '</div>'
      + '<div class="round-col">'
        + '<div class="round-label">Çeyrek Final</div>'
        + [0, 1].map(qfg).join('')
      + '</div>'
      + '<div class="round-col">'
        + '<div class="round-label">Yarı Final</div>'
        + sfg(0)
      + '</div>'
      + '<div class="center-col">'
        + '<div class="trophy">⭐</div>'
        + '<div class="final-label">Final</div>'
        + fg()
      + '</div>'
      + '<div class="round-col round-col--right">'
        + '<div class="round-label">Yarı Final</div>'
        + sfg(1)
      + '</div>'
      + '<div class="round-col round-col--right">'
        + '<div class="round-label">Çeyrek Final</div>'
        + [2, 3].map(qfg).join('')
      + '</div>'
      + '<div class="round-col round-col--right">'
        + '<div class="round-label">Son 16</div>'
        + [4, 5, 6, 7].map(r16g).join('')
      + '</div>';
  }

  window.selectWinner = selectWinner;
  window.resetBracket = resetBracket;

  render();
  checkComplete();
})();
</script>
</body>
</html>
